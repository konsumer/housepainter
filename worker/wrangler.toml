name = "housepainter-images"
main = "src/index.js"
compatibility_date = "2024-01-01"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "housepainter-images"

# KV namespace for:
#  - per-IP rate limit counters  (key: "rl:{ip}", value: count, TTL: 3600s)
#  - per-image fetch counts      (key: "fc:{key}", value: count, TTL: MAX_AGE_SECONDS)
#  - global monthly usage stats  (key: "usage:{YYYY-MM}", value: JSON)
# Create with: npx wrangler kv namespace create RATE_LIMIT
[[kv_namespaces]]
binding = "KV"
id = "37655629a23549fb821e4d1049a3b855"

[vars]
# Max number of times an image URL can be fetched before auto-deletion
MAX_FETCHES = "3"
# Max age of images in seconds (1 hour)
MAX_AGE_SECONDS = "3600"
# Allowed origins for CORS (comma-separated). Localhost is always allowed for dev.
ALLOWED_ORIGIN = "https://konsumer.js.org,http://localhost:51730,http://127.0.0.1:51730"
# Max upload size in bytes (5 MB — keeps storage costs low)
MAX_UPLOAD_BYTES = "5242880"
# Max uploads per IP per hour
RATE_LIMIT_PER_HOUR = "5"

# --- Circuit breaker thresholds (shut off service before hitting paid tier) ---
# R2 free: 10 GB-month storage. Kill at 8 GB (bytes stored this month).
CB_STORAGE_BYTES = "8589934592"
# R2 free: 1M Class A ops/month (writes, lists, deletes). Kill at 800K.
CB_CLASS_A_OPS = "800000"
# R2 free: 10M Class B ops/month (reads/gets). Kill at 8M.
CB_CLASS_B_OPS = "8000000"

[triggers]
crons = ["0 * * * *"]
